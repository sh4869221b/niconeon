name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Validate release tag format
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release tags must match vX.Y.Z: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Resolve version metadata
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "version=${version}"

  wait-for-main-ci:
    name: wait-for-main-ci
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      run_id: ${{ steps.wait.outputs.run_id }}
      run_url: ${{ steps.wait.outputs.run_url }}

    steps:
      - name: Wait for matching main CI run
        id: wait
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          deadline=$(( $(date +%s) + 900 ))

          while true; do
            match="$(
              gh run list \
                --workflow CI \
                --commit "${GITHUB_SHA}" \
                --limit 20 \
                --json databaseId,event,headBranch,status,conclusion,url \
                --jq 'map(select(.event=="push" and .headBranch=="main")) | sort_by(.databaseId) | reverse | .[0] | select(.) | [(.databaseId|tostring), .status, (.conclusion // ""), .url] | @tsv' \
                || true
            )"

            if [[ -n "${match}" ]]; then
              IFS=$'\t' read -r run_id run_status run_conclusion run_url <<<"${match}"
              echo "Found matching CI run: ${run_id} (${run_status}/${run_conclusion:-pending})"
              echo "CI run URL: ${run_url}"

              if [[ "${run_status}" == "completed" ]]; then
                if [[ "${run_conclusion}" == "success" ]]; then
                  echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"
                  echo "run_url=${run_url}" >> "$GITHUB_OUTPUT"
                  exit 0
                fi

                echo "Matching main CI run did not succeed: ${run_conclusion}" >&2
                echo "Fallback: run the manual release-rebuild workflow for ${GITHUB_REF_NAME}." >&2
                exit 1
              fi
            else
              echo "Matching main CI run for ${GITHUB_SHA} is not visible yet."
            fi

            if (( $(date +%s) >= deadline )); then
              echo "Timed out waiting for a successful main CI run for ${GITHUB_SHA}." >&2
              echo "Fallback: run the manual release-rebuild workflow for ${GITHUB_REF_NAME}." >&2
              exit 1
            fi

            sleep 30
          done

  package-source:
    name: package-source
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build source zip
        run: scripts/release/package_source.sh "${{ needs.prepare.outputs.version }}"

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-zip
          path: dist/niconeon-${{ needs.prepare.outputs.version }}-source.zip

  promote-artifacts:
    name: promote-artifacts
    runs-on: ubuntu-latest
    needs:
      - prepare
      - wait-for-main-ci
      - package-source

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: source-zip
          path: dist

      - name: Download prebuilt platform artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf dist/from-ci
          mkdir -p dist/from-ci
          gh run download "${{ needs.wait-for-main-ci.outputs.run_id }}" \
            --dir dist/from-ci \
            --name release-linux-binaries \
            --name release-linux-appimage \
            --name release-windows-binaries

      - name: Promote downloaded artifacts
        run: |
          version="${{ needs.prepare.outputs.version }}"

          linux_zip_src="dist/from-ci/release-linux-binaries/niconeon-linux-x86_64-binaries.zip"
          linux_appimage_src="dist/from-ci/release-linux-appimage/niconeon-linux-x86_64.AppImage"
          windows_zip_src="dist/from-ci/release-windows-binaries/niconeon-windows-x86_64-binaries.zip"

          for required in "${linux_zip_src}" "${linux_appimage_src}" "${windows_zip_src}"; do
            if [[ ! -f "${required}" ]]; then
              echo "missing prebuilt artifact: ${required}" >&2
              echo "Fallback: run the manual release-rebuild workflow for ${GITHUB_REF_NAME}." >&2
              exit 1
            fi
          done

          mv "${linux_zip_src}" "dist/niconeon-${version}-linux-x86_64-binaries.zip"
          mv "${linux_appimage_src}" "dist/niconeon-${version}-linux-x86_64.AppImage"
          mv "${windows_zip_src}" "dist/niconeon-${version}-windows-x86_64-binaries.zip"

      - name: Verify promoted binary artifacts
        run: |
          version="${{ needs.prepare.outputs.version }}"
          scripts/release/verify_binary_artifact_licenses.sh "dist/niconeon-${version}-linux-x86_64-binaries.zip"
          scripts/release/verify_binary_artifact_licenses.sh "dist/niconeon-${version}-linux-x86_64.AppImage"
          scripts/release/verify_binary_artifact_licenses.sh "dist/niconeon-${version}-windows-x86_64-binaries.zip"

      - name: Generate release metadata
        run: |
          scripts/release/write_checksums.sh "${{ needs.prepare.outputs.version }}"
          scripts/release/generate_commit_changelog.sh \
            "${GITHUB_REF_NAME}" \
            dist/release-commit-changelog.md

      - name: Show promoted artifact list
        run: ls -lh dist

      - name: Upload promoted release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-promotion-bundle
          path: |
            dist/niconeon-${{ needs.prepare.outputs.version }}-linux-x86_64-binaries.zip
            dist/niconeon-${{ needs.prepare.outputs.version }}-linux-x86_64.AppImage
            dist/niconeon-${{ needs.prepare.outputs.version }}-windows-x86_64-binaries.zip
            dist/niconeon-${{ needs.prepare.outputs.version }}-sha256sums.txt
            dist/release-commit-changelog.md

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - package-source
      - promote-artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: dist
          merge-multiple: true

      - name: Show artifact list
        run: ls -lh dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-commit-changelog.md
          generate_release_notes: true
          files: |
            dist/niconeon-${{ needs.prepare.outputs.version }}-source.zip
            dist/niconeon-${{ needs.prepare.outputs.version }}-linux-x86_64-binaries.zip
            dist/niconeon-${{ needs.prepare.outputs.version }}-linux-x86_64.AppImage
            dist/niconeon-${{ needs.prepare.outputs.version }}-windows-x86_64-binaries.zip
            dist/niconeon-${{ needs.prepare.outputs.version }}-sha256sums.txt

      - name: Update repository CHANGELOG.md
        run: |
          scripts/release/update_repo_changelog.sh \
            "${GITHUB_REF_NAME}" \
            "${{ github.event.repository.default_branch }}"
