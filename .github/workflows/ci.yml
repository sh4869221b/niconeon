name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  license-check:
    name: license-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-license
        run: cargo install --locked cargo-license

      - name: Verify third-party notices are up to date
        run: |
          scripts/release/generate_third_party_notices.sh
          git diff --exit-code -- THIRD_PARTY_NOTICES.txt

      - name: Verify required license metadata files
        run: |
          test -f LICENSE
          test -f COPYING
          test -f SOURCE_CODE.md

  core-test:
    name: core-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Run core tests
        run: cargo test --manifest-path core/Cargo.toml

  ui-build-linux:
    name: ui-build-linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux UI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            pkg-config \
            libmpv-dev \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-declarative-dev \
            qt6-declarative-dev-tools

      - name: Configure UI (Linux)
        run: cmake -S app-ui -B app-ui/build-ci -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build UI (Linux)
        run: cmake --build app-ui/build-ci --parallel

      - name: Setup Rust
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install Linux release packaging dependencies
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sudo apt-get install -y --no-install-recommends \
            zip \
            patchelf \
            desktop-file-utils

      - name: Build core (release)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cargo build --release --manifest-path core/Cargo.toml -p niconeon-core

      - name: Package Linux binaries zip
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          NICONEON_UI_BUILD_DIR: app-ui/build-ci
          NICONEON_CORE_BUILD_DIR: core/target/release
          NICONEON_RELEASE_BASENAME: niconeon-linux-x86_64
        run: scripts/release/package_linux.sh ci

      - name: Verify Linux binaries license bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: scripts/release/verify_binary_artifact_licenses.sh dist/niconeon-linux-x86_64-binaries.zip

      - name: Package Linux AppImage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          NICONEON_UI_BUILD_DIR: app-ui/build-ci
          NICONEON_CORE_BUILD_DIR: core/target/release
          NICONEON_RELEASE_BASENAME: niconeon-linux-x86_64
        run: scripts/release/package_linux_appimage.sh ci

      - name: Verify Linux AppImage license bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: scripts/release/verify_binary_artifact_licenses.sh dist/niconeon-linux-x86_64.AppImage

      - name: Upload Linux binaries artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-binaries
          path: dist/niconeon-linux-x86_64-binaries.zip
          retention-days: 14

      - name: Upload Linux AppImage artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-appimage
          path: dist/niconeon-linux-x86_64.AppImage
          retention-days: 14

  ui-unit-linux:
    name: ui-unit-linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux UI test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            pkg-config \
            libmpv-dev \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-declarative-dev \
            qt6-declarative-dev-tools

      - name: Configure UI unit tests (Linux)
        run: |
          cmake -S app-ui -B app-ui/build-test-ci -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON

      - name: Build UI unit tests (Linux)
        run: cmake --build app-ui/build-test-ci --parallel

      - name: Run UI unit tests (Linux)
        run: ctest --test-dir app-ui/build-test-ci --output-on-failure

  ui-e2e-linux-best-effort:
    name: ui-e2e-linux-best-effort
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux UI/E2E dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            pkg-config \
            libmpv-dev \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-declarative-dev \
            qt6-declarative-dev-tools \
            qml6-module-qtqml-workerscript \
            xvfb

      - name: Configure UI E2E (Linux)
        run: |
          cmake -S app-ui -B app-ui/build-e2e-ci -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DNICONEON_BUILD_UI_E2E=ON

      - name: Build UI E2E (Linux)
        run: cmake --build app-ui/build-e2e-ci --parallel

      - name: Run UI E2E (Linux, best effort)
        run: |
          xvfb-run -a env \
            LIBGL_ALWAYS_SOFTWARE=1 \
            MESA_LOADER_DRIVER_OVERRIDE=llvmpipe \
            ctest --test-dir app-ui/build-e2e-ci --output-on-failure -R rendernode_alignment_e2e

  ui-build-windows:
    name: ui-build-windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 (Qt6 + mpv)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          cache: true
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-ccache
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-declarative
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-mpv
            unzip
            zip

      - name: Cache ccache (Windows UI)
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\\.ccache
          key: ccache-windows-ui-${{ runner.os }}-${{ hashFiles('app-ui/CMakeLists.txt', 'app-ui/src/**', 'app-ui/qml/**') }}
          restore-keys: |
            ccache-windows-ui-${{ runner.os }}-

      - name: Configure UI (Windows)
        shell: msys2 {0}
        run: |
          export CCACHE_DIR="$(cygpath -u "$GITHUB_WORKSPACE")/.ccache"
          ccache -z || true
          cmake -S app-ui -B app-ui/build-ci -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build UI (Windows)
        shell: msys2 {0}
        run: |
          export CCACHE_DIR="$(cygpath -u "$GITHUB_WORKSPACE")/.ccache"
          cmake --build app-ui/build-ci --parallel
          ccache -s || true

      - name: Setup Rust
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Build core (release, MSVC)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: cargo build --release --manifest-path core/Cargo.toml -p niconeon-core

      - name: Package Windows binaries zip
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: msys2 {0}
        env:
          NICONEON_UI_BUILD_DIR: app-ui/build-ci
          NICONEON_CORE_BUILD_DIR: core/target/release
          NICONEON_RELEASE_BASENAME: niconeon-windows-x86_64
        run: scripts/release/package_windows_msys2.sh ci

      - name: Verify Windows binaries license bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: msys2 {0}
        run: scripts/release/verify_binary_artifact_licenses.sh dist/niconeon-windows-x86_64-binaries.zip

      - name: Verify Windows bundle includes qt.conf
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: msys2 {0}
        run: unzip -Z1 dist/niconeon-windows-x86_64-binaries.zip | grep -E '/qt\.conf$'

      - name: Upload Windows binaries artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-binaries
          path: dist/niconeon-windows-x86_64-binaries.zip
          retention-days: 14
