name: Release Rebuild

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish (vX.Y.Z)
        required: true
        type: string
      source_ref:
        description: Git ref to build from (defaults to release_tag)
        required: false
        type: string

concurrency:
  group: release-rebuild-${{ inputs.release_tag }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      source_ref: ${{ steps.meta.outputs.source_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve and validate release inputs
        id: meta
        run: |
          release_tag="${{ inputs.release_tag }}"
          source_ref="${{ inputs.source_ref }}"

          if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release tags must match vX.Y.Z: ${release_tag}" >&2
            exit 1
          fi

          if [[ -z "${source_ref}" ]]; then
            source_ref="${release_tag}"
          fi

          if ! git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null; then
            echo "release tag not found locally: ${release_tag}" >&2
            echo "Create/push the tag first, then rerun this workflow." >&2
            exit 1
          fi

          if ! git rev-parse -q --verify "${source_ref}^{commit}" >/dev/null; then
            echo "source ref not found: ${source_ref}" >&2
            exit 1
          fi

          version="${release_tag#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "source_ref=${source_ref}" >> "$GITHUB_OUTPUT"
          echo "version=${version}"
          echo "source_ref=${source_ref}"

      - name: Checkout build source
        run: git checkout --detach "${{ steps.meta.outputs.source_ref }}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-license
        run: cargo install --locked cargo-license

      - name: Verify third-party notices are up to date
        run: |
          scripts/release/generate_third_party_notices.sh
          git diff --exit-code -- THIRD_PARTY_NOTICES.txt

      - name: Verify required license metadata files
        run: |
          test -f LICENSE
          test -f COPYING
          test -f SOURCE_CODE.md

  package-source:
    name: package-source
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.source_ref }}

      - name: Build source zip
        run: scripts/release/package_source.sh "${{ needs.prepare.outputs.version }}"

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-zip
          path: dist/niconeon-${{ needs.prepare.outputs.version }}-source.zip

  package-linux:
    name: package-linux
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            pkg-config \
            libmpv-dev \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-declarative-dev \
            qt6-declarative-dev-tools \
            zip

      - name: Build core (release)
        run: cargo build --release --manifest-path core/Cargo.toml -p niconeon-core

      - name: Build UI (release)
        run: |
          cmake -S app-ui -B app-ui/build-release -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build app-ui/build-release --parallel

      - name: Package Linux binaries zip
        run: scripts/release/package_linux.sh "${{ needs.prepare.outputs.version }}"

      - name: Verify Linux binaries license bundle
        run: scripts/release/verify_binary_artifact_licenses.sh "dist/niconeon-${{ needs.prepare.outputs.version }}-linux-x86_64-binaries.zip"

      - name: Upload Linux binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries-zip
          path: dist/niconeon-${{ needs.prepare.outputs.version }}-linux-x86_64-binaries.zip

  package-linux-appimage:
    name: package-linux-appimage
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            pkg-config \
            libmpv-dev \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-declarative-dev \
            qt6-declarative-dev-tools \
            zip \
            patchelf \
            desktop-file-utils

      - name: Build core (release)
        run: cargo build --release --manifest-path core/Cargo.toml -p niconeon-core

      - name: Build UI (release)
        run: |
          cmake -S app-ui -B app-ui/build-release -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build app-ui/build-release --parallel

      - name: Package Linux AppImage
        run: scripts/release/package_linux_appimage.sh "${{ needs.prepare.outputs.version }}"

      - name: Verify Linux AppImage license bundle
        run: scripts/release/verify_binary_artifact_licenses.sh "dist/niconeon-${{ needs.prepare.outputs.version }}-linux-x86_64.AppImage"

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/niconeon-${{ needs.prepare.outputs.version }}-linux-x86_64.AppImage

  package-windows:
    name: package-windows
    runs-on: windows-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Build core (release, MSVC)
        shell: pwsh
        run: |
          $start = Get-Date
          echo "::notice title=timing::package-windows core build started $($start.ToUniversalTime().ToString('o'))"
          cargo build --release --manifest-path core/Cargo.toml -p niconeon-core
          $elapsed = [int]((Get-Date) - $start).TotalSeconds
          echo "::notice title=timing::package-windows core build finished (${elapsed}s)"

      - name: Setup MSYS2 (Qt6 + mpv)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          cache: true
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-ccache
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-declarative
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-mpv
            unzip
            zip

      - name: Cache ccache (Windows release)
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\\.ccache
          key: ccache-windows-release-${{ runner.os }}-${{ hashFiles('app-ui/CMakeLists.txt', 'app-ui/src/**', 'app-ui/qml/**') }}
          restore-keys: |
            ccache-windows-release-${{ runner.os }}-

      - name: Show MSYS2 package versions
        shell: msys2 {0}
        run: pacman -Q | grep -E '^mingw-w64-x86_64-(gcc|cmake|ninja|pkgconf|ccache|qt6-base|qt6-declarative|qt6-tools|mpv)( |$)' || true

      - name: Build UI (release, MSYS2)
        shell: msys2 {0}
        run: |
          start_epoch="$(date +%s)"
          echo "::notice title=timing::package-windows ui build started $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export CCACHE_DIR="$(cygpath -u "$GITHUB_WORKSPACE")/.ccache"
          ccache -z || true
          cmake -S app-ui -B app-ui/build-release -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build app-ui/build-release --parallel
          ccache -s || true
          end_epoch="$(date +%s)"
          echo "::notice title=timing::package-windows ui build finished ($((end_epoch - start_epoch))s)"

      - name: Package Windows binaries zip
        shell: msys2 {0}
        run: |
          start_epoch="$(date +%s)"
          echo "::notice title=timing::package-windows packaging started $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          scripts/release/package_windows_msys2.sh "${{ needs.prepare.outputs.version }}"
          end_epoch="$(date +%s)"
          echo "::notice title=timing::package-windows packaging finished ($((end_epoch - start_epoch))s)"

      - name: Verify Windows binaries license bundle
        shell: msys2 {0}
        run: scripts/release/verify_binary_artifact_licenses.sh "dist/niconeon-${{ needs.prepare.outputs.version }}-windows-x86_64-binaries.zip"

      - name: Verify Windows bundle includes qt.conf
        shell: msys2 {0}
        run: |
          unzip -Z1 "dist/niconeon-${{ needs.prepare.outputs.version }}-windows-x86_64-binaries.zip" \
            | grep -E '/qt\.conf$'

      - name: Upload Windows binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries-zip
          path: dist/niconeon-${{ needs.prepare.outputs.version }}-windows-x86_64-binaries.zip

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - package-source
      - package-linux
      - package-linux-appimage
      - package-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.source_ref }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: scripts/release/write_checksums.sh "${{ needs.prepare.outputs.version }}"

      - name: Generate commit changelog body
        run: |
          scripts/release/generate_commit_changelog.sh \
            "${{ inputs.release_tag }}" \
            dist/release-commit-changelog.md

      - name: Show artifact list
        run: ls -lh dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          body_path: dist/release-commit-changelog.md
          generate_release_notes: true
          files: |
            dist/niconeon-${{ needs.prepare.outputs.version }}-source.zip
            dist/niconeon-${{ needs.prepare.outputs.version }}-linux-x86_64-binaries.zip
            dist/niconeon-${{ needs.prepare.outputs.version }}-linux-x86_64.AppImage
            dist/niconeon-${{ needs.prepare.outputs.version }}-windows-x86_64-binaries.zip
            dist/niconeon-${{ needs.prepare.outputs.version }}-sha256sums.txt

      - name: Update repository CHANGELOG.md
        run: |
          scripts/release/update_repo_changelog.sh \
            "${{ inputs.release_tag }}" \
            "${{ github.event.repository.default_branch }}"
